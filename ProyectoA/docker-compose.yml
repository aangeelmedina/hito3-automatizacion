version: '3.8'

services:
  # 1. PostgreSQL: Base de datos relacional para metadatos
  postgres:
    image: postgres:16-alpine
    container_name: rag_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=adminpassword
      - POSTGRES_DB=rag_metadata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - rag_network

  # 2. Qdrant: Base de datos vectorial para los embeddings
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333" # API REST
      - "6334:6334" # gRPC
    networks:
      - rag_network

  # 3. Ollama: Motor de Modelos de Lenguaje (LLM) y Embeddings
  ollama:
    image: ollama/ollama:latest
    container_name: rag_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - rag_network
  # 4. n8n: Orquestador del flujo de trabajo
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: rag_n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/Madrid
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    depends_on:
      - postgres
      - qdrant
      - ollama
    networks:
      - rag_network

# Definición de volúmenes persistentes
volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
  n8n_data:

# Red interna para que los contenedores se comuniquen entre sí
networks:
  rag_network:
    driver: bridge